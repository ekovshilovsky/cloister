# Unattended macOS Tahoe Setup Assistant Configuration
# Use with: lume create my-vm --os macOS --ipsw latest --unattended tahoe

# Seconds to wait after VM boots before starting automation
boot_wait: 30

boot_commands:
  # Wait for greeting screen to appear (shows "Hello" animation cycling through languages)
  # The boot_wait should be enough for the VM to reach this screen
  # Note: VM framebuffer is 1920x1440 (Retina-scaled)
  - "<delay 5>"

  # Press spacebar to dismiss the greeting screen ("Hello" animation)
  - "<space>"
  - "<delay 2>"

  # Language selection screen
  # Wait for "English" to be visible in the list (may take a moment as languages cycle)
  - "<wait 'English', timeout=120>"
  - "<delay 1>"

  # Type "English" to filter the list, click on "English" to select it, then press Enter
  - "<type 'English'>"
  - "<delay 1>"
  - "<click 'English'>"
  - "<delay 1>"
  - "<enter>"
  - "<delay 2>"

  # Country/Region selection
  - "<wait 'Country or Region'>"
  - "<delay 1>"
  # Click in the center of the list area to give it focus before typing
  - "<click_at 960,900>"
  - "<delay 1>"
  # Type to filter the country list
  - "<type 'United States'>"
  - "<delay 1>"
  # Press Enter to select the filtered item in the list
  - "<enter>"
  - "<delay 1>"
  # Click Continue button to proceed
  - "<click 'Continue'>"
  - "<delay 2>"

  # Transfer Your Data to This Mac (Migration Assistant)
  - "<wait 'Transfer Your Data'>"
  - "<delay 30>" # wait for refresh
  # Use tab navigation to select "Set up as new" (4th option)
  - "<click 'Set up as new'>"
  - "<delay 2>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Written and Spoken Languages screen (appears AFTER "Set up as new")
  - "<wait 'Written and Spoken Languages'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Accessibility screen - skip it
  - "<wait 'Accessibility'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 2>"

  # Data & Privacy screen
  - "<wait 'Data & Privacy'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Create a Mac Account
  # Field order: Full Name -> Account Name (auto-filled) -> Password -> Verify Password -> Hint -> Checkbox -> Continue
  - "<wait 'Create a Mac Account'>"
  - "<delay 10>"
  - "<click 'Full Name'>"
  - "<delay 1>"
  # Type Full Name
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Skip Account Name (auto-filled from Full Name)
  - "<tab>"
  - "<delay 1>"
  # Type Password
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Type Verify Password
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  # Skip Hint field
  - "<tab>"
  - "<delay 1>"
  # Untoggle "Allow computer account password to be reset with Apple Account" checkbox
  - "<space>"
  - "<delay 1>"
  # Click Continue button
  - "<click 'Continue'>"
  - "<delay 2>"

  # Sign In to Your Apple Account - skip it
  # macOS 26.4 moved the skip option behind "Other Sign-In Options" dropdown.
  # The old "Set Up Later" button no longer exists on this screen.
  - "<wait 'Email or Phone Number'>"
  - "<delay 1>"
  # Click the dropdown to reveal skip options
  - "<click 'Other Sign-In Options'>"
  - "<delay 2>"
  # Select "Sign in Later in Settings" from the dropdown
  - "<click 'Sign in Later in Settings'>"
  - "<delay 2>"
  # Confirmation popup: "Are you sure you want to skip signing in with an Apple Account?"
  - "<wait 'Skip'>"
  - "<delay 1>"
  - "<click 'Skip'>"
  - "<delay 2>"

  # Terms and Conditions
  # "Agree" appears in license text, so use index=-1 to click the last occurrence (the button)
  - "<wait 'Terms and Conditions'>"
  - "<delay 1>"
  - "<click 'Agree', index=-1>"
  - "<delay 1>"
  # Confirmation popup: "I have read and agree to the macOS Software License Agreement"
  # Modal "Agree" button is above the grayed-out background button, so use index=0 (first/topmost)
  - "<wait 'I have read and agree'>"
  - "<delay 1>"
  - "<click 'Agree', index=0>"
  - "<delay 2>"

  # Age Range (new in macOS 26.4 — not present in earlier versions)
  # Select "Adult" to skip parental controls setup
  - "<wait 'Age Range'>"
  - "<delay 1>"
  - "<click 'Adult'>"
  - "<delay 2>"

  # Enable Location Services (skip it)
  - "<wait 'Enable Location Services'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 1>"
  # Confirmation popup: "Are you sure you don't want to use Location Services?"
  - '<wait "Don''t Use">'
  - "<delay 1>"
  - "<enter>"
  - "<delay 2>"

  # Select Your Time Zone
  - "<wait 'Select Your Time Zone'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Analytics
  - "<wait 'Analytics'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Screen Time
  - "<wait 'Screen Time'>"
  - "<delay 1>"
  - "<click 'Set Up Later'>"
  - "<delay 2>"

  # Siri (longer timeout as Screen Time page can be slow)
  - "<wait 'Siri', timeout=300>"
  - "<delay 2>"
  - "<click 'Enable Ask Siri'>"
  - "<delay 2>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # FileVault - skip it
  - "<wait 'FileVault'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 1>"
  # Confirmation popup: "Mac Data Will Not Be Securely Encrypted"
  - "<wait 'Securely Encrypted'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Choose Your Look (Light/Dark mode)
  - "<wait 'Choose Your Look'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Update Mac Automatically
  - "<wait 'Update Mac Automatically'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Welcome screen - final step
  - "<wait 'welcome'>"
  - "<delay 1>"
  - "<click 'Get Started'>"
  - "<delay 5>"

  # Setup complete - wait for desktop to fully load
  - "<delay 30>"

  # Click on desktop to give it keyboard focus
  # Without this, hotkeys won't work (you'll hear the "trrr" error sound)
  - "<click_at 960,540>"
  - "<delay 1>"

  # ============================================
  # Terminal: enable keyboard navigation and SSH via command line
  # ============================================
  # Using Terminal commands instead of System Settings UI navigation because
  # macOS 26.4 changed the Remote Login settings panel layout and auth dialogs,
  # making the space/tab/click approach unreliable. Command-line enablement
  # via systemsetup and launchctl is deterministic and version-independent.
  - "<cmd+space>"
  - "<delay 5>"
  - "<type 'Termina', delay=350>"
  - "<delay 5>"
  - "<enter>"
  - "<delay 5>"

  # Enable full keyboard navigation (required for Tab key to work system-wide)
  - "<type 'defaults write NSGlobalDomain AppleKeyboardUIMode -int 3', delay=350>"
  - "<enter>"
  - "<delay 3>"

  # Enable Remote Login (SSH) via systemsetup — requires admin password
  # The -setremotelogin flag is the supported CLI method for enabling sshd.
  # Pipe the password via stdin for the sudo prompt.
  - "<type 'echo lume | sudo -S systemsetup -setremotelogin on', delay=350>"
  - "<enter>"
  - "<delay 5>"

  # Verify SSH is enabled (belt-and-suspenders: also start via launchctl)
  - "<type 'echo lume | sudo -S launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>/dev/null; echo SSH status: $(echo lume | sudo -S systemsetup -getremotelogin 2>&1)', delay=350>"
  - "<enter>"
  - "<delay 5>"

  # Close Terminal
  - "<cmd+q>"
  - "<delay 2>"

  # ============================================
  # Setup Complete!
  # ============================================
  # SSH is now enabled - Connect with: ssh lume@<ip-address> (password: lume)

# Health check to verify setup was successful
# This will SSH into the VM to confirm SSH is working
health_check:
  type: ssh
  user: lume
  password: lume
  timeout: 60
  retries: 10
  retry_delay: 15

# Post-setup commands to run via SSH after health check passes
# These are more reliable than typing in Terminal via VNC
post_ssh_commands:
  # Lume auto-rewrites "sudo " to "echo 'lume' | sudo -S " for all
  # post_ssh_commands, so use bare sudo everywhere — do NOT add
  # "echo lume | sudo -S" manually or it gets double-rewritten.
  #
  # Passwordless sudo must be first — all subsequent commands depend on it.
  - "sudo sh -c 'echo \"lume ALL=(ALL) NOPASSWD: ALL\" > /etc/sudoers.d/lume && chmod 0440 /etc/sudoers.d/lume'"
  - "sudo sysadminctl -autologin set -userName lume -password lume"
  - "perl -e 'my @k=(125,137,82,35,210,188,221,234,163,185,31);my @p=unpack(q{C*},q{lume});my @e;for my $i(0..$#p){$e[$i]=$p[$i]^$k[$i%scalar@k]}my $r=scalar@e%12;push@e,(0)x(12-$r) if $r;open my $f,q{>},q{/tmp/kcp};binmode $f;print $f pack(q{C*},@e);close $f'"
  - "sudo cp /tmp/kcp /etc/kcpassword"
  - "sudo chmod 600 /etc/kcpassword"
  - "rm /tmp/kcp"
  - "defaults -currentHost write com.apple.screensaver idleTime -int 0"
  - "defaults -currentHost write com.apple.screensaver askForPassword -int 0"
  - "defaults -currentHost write com.apple.screensaver askForPasswordDelay -int 0"
  - "sudo pmset -a displaysleep 0 sleep 0"
  - "sudo defaults write /Library/Preferences/.GlobalPreferences com.apple.autologout.AutoLogOutDelay -int 0"
