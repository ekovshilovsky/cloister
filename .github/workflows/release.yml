name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Build release binaries
        run: make release

      - name: Build cloister-vm binaries
        run: make release-vm

      - name: Build cloister-vm .deb packages
        run: |
          VERSION=$(make -s print-version)
          scripts/build-deb-vm.sh "$VERSION" dist dist/deb

      - name: Build APT repository
        env:
          GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          # Import the GPG signing key for APT repo
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Set up the pool directory with .deb files
          mkdir -p dist/apt-repo/pool
          cp dist/deb/*.deb dist/apt-repo/pool/
          scripts/build-apt-repo.sh dist/apt-repo

      - name: Publish APT repository to GitHub Pages
        run: |
          VERSION=$(make -s print-version)
          cd dist/apt-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Update APT repository for ${VERSION}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          if echo "$TAG_NAME" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" dist/*.tar.gz \
            --title "$TAG_NAME" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG

      - name: Update Homebrew formula
        if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(make -s print-version)
          SHA_DARWIN_ARM64=$(sha256sum dist/cloister_${VERSION}_darwin_arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(sha256sum dist/cloister_${VERSION}_darwin_amd64.tar.gz | cut -d' ' -f1)

          cat > /tmp/cloister.rb <<FORMULA_EOF
          class Cloister < Formula
            desc "Isolated VM environments for AI coding agents and multi-account separation"
            homepage "https://github.com/ekovshilovsky/cloister"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ekovshilovsky/cloister/releases/download/v${VERSION}/cloister_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/ekovshilovsky/cloister/releases/download/v${VERSION}/cloister_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            def install
              bin.install "cloister"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cloister version")
            end
          end
          FORMULA_EOF

          git clone "https://x-access-token:${GH_TOKEN}@github.com/ekovshilovsky/homebrew-tap.git" /tmp/homebrew-tap
          cp /tmp/cloister.rb /tmp/homebrew-tap/Formula/cloister.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cloister.rb
          git diff --cached --quiet || git commit -m "Update cloister to ${VERSION}"
          git push
