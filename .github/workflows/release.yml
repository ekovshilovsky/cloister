name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binaries
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          LDFLAGS="-s -w -X github.com/ekovshilovsky/cloister/cmd.Version=${VERSION}"
          for PAIR in "darwin amd64" "darwin arm64"; do
            OS=$(echo $PAIR | cut -d' ' -f1)
            ARCH=$(echo $PAIR | cut -d' ' -f2)
            DIR="cloister_${VERSION}_${OS}_${ARCH}"
            mkdir -p "dist/${DIR}"
            GOOS=$OS GOARCH=$ARCH go build -ldflags="${LDFLAGS}" -o "dist/${DIR}/cloister" .
            tar -czf "dist/${DIR}.tar.gz" -C "dist/${DIR}" cloister
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/*.tar.gz \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          SHA_DARWIN_ARM64=$(sha256sum dist/cloister_${VERSION}_darwin_arm64.tar.gz | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(sha256sum dist/cloister_${VERSION}_darwin_amd64.tar.gz | cut -d' ' -f1)

          cat > /tmp/cloister.rb <<FORMULA_EOF
          class Cloister < Formula
            desc "Isolated VM environments for AI coding agents and multi-account separation"
            homepage "https://github.com/ekovshilovsky/cloister"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ekovshilovsky/cloister/releases/download/v${VERSION}/cloister_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/ekovshilovsky/cloister/releases/download/v${VERSION}/cloister_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            def install
              bin.install "cloister"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cloister version")
            end
          end
          FORMULA_EOF

          git clone "https://x-access-token:${GH_TOKEN}@github.com/ekovshilovsky/homebrew-tap.git" /tmp/homebrew-tap
          cp /tmp/cloister.rb /tmp/homebrew-tap/Formula/cloister.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cloister.rb
          git diff --cached --quiet || git commit -m "Update cloister to ${VERSION}"
          git push
